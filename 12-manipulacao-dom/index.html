<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manipulação do DOM</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    button { margin-right: 8px; }
    #mensagem { margin-top: 12px; font-size: 1.1rem; }
  </style>
</head>
<body>
  <h1>Manipulação do DOM</h1>
  <input id="campoTexto" type="text" placeholder="Digite seu nome ou uma mensagem" />
  <button id="botaoAction">Enviar mensagem</button>
  <button id="botaoAdicionar">Adicionar item</button>
  <div id="mensagem"></div>
  <ul id="listaMensagens"></ul>
  <script src="index.js"></script>
</body>
</html>
